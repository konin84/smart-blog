<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Smart Blog</title>
</head>

<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #111;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto;">
        <tr>
            <td style="padding: 24px; background: #f7f7f7; border-radius: 8px;">
                <h1 style="margin-top: 0; color: #333;">Welcome to Smart Blog, {{ username }}!</h1>
                <p style="font-size: 16px; color: #444;">Your account has been created successfully.</p>
                <p style="font-size: 16px; color: #444;">You can now log in and start writing posts, manage your
                    profile, and explore the blog.</p>
                <p style="font-size: 16px; color: #444;">If you need help, contact us at <a
                        href="mailto:{{ support_email }}">{{ support_email }}</a>.</p>
                <p style="font-size: 16px; color: #444;">Cheers,<br>The Smart Blog Team</p>
            </td>
        </tr>
    </table>
</body>

</html>
